name: Deploy to GitHub Pages


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run hourly
    - cron: '0 * * * *'

# Allow one concurrent deployment. Do not cancel an in-progress run: a PR push
# (or a newer main push) must not abort a production deploy mid-flight, since
# run-level cancellation ignores the deploy job's `if: refs/heads/main` guard.
# This matches GitHub's canonical Pages workflow setting.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    # Least-privilege: this job only reads the repo. Job-level permissions
    # REPLACE (not merge with) the top-level block, so pages/id-token are dropped.
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Type check
      run: bun run typecheck

    - name: Lint
      # Blocking gate: eslint + eslint-config-next are installed and configured
      # (.eslintrc.json). `next lint` fails the job on errors; warnings are allowed.
      run: bun run lint

    - name: Test
      run: bun test --pass-with-no-tests

  build:
    runs-on: ubuntu-latest
    needs: verify
    # Least-privilege: build only needs to read the repo and produce an artifact.
    # The Pages-deploy grants (pages: write, id-token: write) belong to the
    # deploy job, which inherits them from the top-level permissions block.
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Refresh blog content and check for updates
      if: github.event_name != 'pull_request'
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: "cc2cf42cf4b74db1901b8e28d3f67a06"
        INDEX_OUTPUT: "public/posts/index.json"
        FULL_INDEX_OUTPUT: "public/blog-index.json"
        POSTS_DIR: "public/posts"
      run: |
        echo "🔄 Refreshing content..."
        bun run refresh-content
        echo "✅ Content refresh completed"

    - name: Refresh notes content and check for updates
      if: github.event_name != 'pull_request'
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: "19448583e65d80f7b5a1e7218bf4e049"
        INDEX_OUTPUT: "public/notes/index.json"
        FULL_INDEX_OUTPUT: "public/notes-index.json"
        POSTS_DIR: "public/notes"
      run: |
        echo "🔄 Refreshing content..."
        bun run refresh-content
        echo "✅ Content refresh completed"

    - name: Validate content
      run: node scripts/validate-content.js

    - name: Build application
      run: bun run build
      env:
        NODE_ENV: production
        NEXT_PUBLIC_BASE_URL: "https://dimasc.tf"
        NEXT_PUBLIC_BASE_PATH: ""

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Post-deployment SEO verification
      run: |
        echo "🎉 Deployment successful!"
        echo "📍 Site URL: ${{ steps.deployment.outputs.page_url }}"
        echo "🗺️ Sitemap: ${{ steps.deployment.outputs.page_url }}sitemap-indexs.xml"
        echo "🤖 Robots.txt: ${{ steps.deployment.outputs.page_url }}robots.txt"
        echo ""
        echo "📋 Next steps for SEO:"
        echo "1. Submit sitemap to Google Search Console"
        echo "2. Submit sitemap to Bing Webmaster Tools"
        echo "3. Test with Google Rich Results Test"
        echo "4. Verify OpenGraph tags with Facebook Debugger"
